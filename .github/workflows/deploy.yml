name: Deploy pizzarustica.fr

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: pizzarustica-fr

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pizzarustica-fr/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Ensure Cloudflare Pages project exists
        run: |
          if npx wrangler pages project list 2>&1 | awk 'NR>2 {print $1}' | grep -qx "pizzarustica-fr"; then
            echo "Project pizzarustica-fr already exists."
          else
            echo "Creating Cloudflare Pages project pizzarustica-fr…"
            npx wrangler pages project create pizzarustica-fr \
              --production-branch=main
          fi

      - name: Deploy to Cloudflare Pages (production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          npx wrangler pages deploy dist \
            --project-name=pizzarustica-fr \
            --branch=main \
            --commit-dirty=true \
            --commit-message="ci: ${GITHUB_SHA::7} on main"

      - name: Deploy to Cloudflare Pages (preview)
        if: github.event_name == 'pull_request'
        run: |
          BRANCH="${{ github.head_ref }}"
          # Cloudflare branch names must match [a-z0-9-]; sanitize
          SAFE_BRANCH=$(echo "$BRANCH" | tr 'A-Z/_.' 'a-z----' | tr -cd 'a-z0-9-' | cut -c1-28)
          npx wrangler pages deploy dist \
            --project-name=pizzarustica-fr \
            --branch="$SAFE_BRANCH" \
            --commit-dirty=true \
            --commit-message="ci: PR #${{ github.event.pull_request.number }} (${BRANCH})"
