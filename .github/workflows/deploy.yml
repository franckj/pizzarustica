name: Deploy pizzarustica.fr

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: pizzarustica-fr

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: pizzarustica-fr/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Ensure Cloudflare Pages project exists
        run: |
          set -euo pipefail
          PROJECT="pizzarustica-fr"
          API="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects"
          AUTH=(-H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type: application/json")

          status=$(curl -sS -o /tmp/project.json -w "%{http_code}" "${AUTH[@]}" "${API}/${PROJECT}")
          if [ "$status" = "200" ]; then
            echo "Project ${PROJECT} already exists."
            exit 0
          fi
          if [ "$status" != "404" ]; then
            echo "Unexpected response (HTTP ${status}) checking project:"
            cat /tmp/project.json
            exit 1
          fi

          echo "Creating Cloudflare Pages project ${PROJECT}…"
          create_status=$(curl -sS -o /tmp/create.json -w "%{http_code}" -X POST "${AUTH[@]}" "$API" \
            --data "{\"name\":\"${PROJECT}\",\"production_branch\":\"main\"}")
          if [ "$create_status" != "200" ] && [ "$create_status" != "201" ]; then
            echo "Failed to create project (HTTP ${create_status}):"
            cat /tmp/create.json
            echo
            echo "Hint: the CLOUDFLARE_API_TOKEN needs 'Account · Cloudflare Pages · Edit' permission to create projects."
            exit 1
          fi
          echo "Project ${PROJECT} created."

      - name: Deploy to Cloudflare Pages (production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          npx wrangler pages deploy dist \
            --project-name=pizzarustica-fr \
            --branch=main \
            --commit-dirty=true \
            --commit-message="ci: ${GITHUB_SHA::7} on main"

      - name: Deploy to Cloudflare Pages (preview)
        if: github.event_name == 'pull_request'
        run: |
          BRANCH="${{ github.head_ref }}"
          # Cloudflare branch names must match [a-z0-9-]; sanitize
          SAFE_BRANCH=$(echo "$BRANCH" | tr 'A-Z/_.' 'a-z----' | tr -cd 'a-z0-9-' | cut -c1-28)
          npx wrangler pages deploy dist \
            --project-name=pizzarustica-fr \
            --branch="$SAFE_BRANCH" \
            --commit-dirty=true \
            --commit-message="ci: PR #${{ github.event.pull_request.number }} (${BRANCH})"

      - name: Debug — current Cloudflare state (production only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set +e
          AUTH=(-H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          BASE="https://api.cloudflare.com/client/v4"
          echo "== Token presence =="
          [ -n "${CLOUDFLARE_API_TOKEN:-}" ] && echo "API_TOKEN: set (len=${#CLOUDFLARE_API_TOKEN})" || echo "API_TOKEN: MISSING"
          [ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ] && echo "ACCOUNT_ID: set (len=${#CLOUDFLARE_ACCOUNT_ID})" || echo "ACCOUNT_ID: MISSING"
          echo
          echo "== Pages project (pizzarustica-fr) =="
          curl -sS "${AUTH[@]}" "$BASE/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/pizzarustica-fr" \
            | jq '{success, name: .result.name, subdomain: .result.subdomain, domains: .result.domains, latest: .result.latest_deployment.url, errors}'
          echo
          echo "== Pages domains attached =="
          curl -sS "${AUTH[@]}" "$BASE/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/pizzarustica-fr/domains" \
            | jq '{success, count: (.result | length), domains: [.result[]? | {name, status}], errors}'
          echo
          echo "== Zone pizzarustica.fr =="
          curl -sS "${AUTH[@]}" "$BASE/zones?name=pizzarustica.fr" \
            | jq '{success, count: (.result | length), id: .result[0].id, status: .result[0].status, errors}'
          ZONE_ID=$(curl -sS "${AUTH[@]}" "$BASE/zones?name=pizzarustica.fr" | jq -r '.result[0].id // empty')
          if [ -n "$ZONE_ID" ]; then
            echo
            echo "== DNS records on apex + www =="
            for NAME in pizzarustica.fr www.pizzarustica.fr; do
              echo "--- $NAME ---"
              curl -sS "${AUTH[@]}" "$BASE/zones/$ZONE_ID/dns_records?name=$NAME" \
                | jq '.result[]? | {type, name, content, proxied, id}'
            done
          fi

      - name: Remove conflicting DNS records on apex/www (production only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          ZONE_NAME="pizzarustica.fr"
          AUTH=(-H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type: application/json")
          BASE="https://api.cloudflare.com/client/v4"

          zone_id=$(curl -sS "${AUTH[@]}" "$BASE/zones?name=$ZONE_NAME" \
            | jq -r '.result[0].id // empty')
          if [ -z "$zone_id" ]; then
            echo "Zone $ZONE_NAME not reachable by this token — assuming external DNS, skipping cleanup."
            exit 0
          fi

          deleted=0
          for NAME in "$ZONE_NAME" "www.$ZONE_NAME"; do
            # Include NS so we kill any sub-delegation (e.g. www delegated to sedoparking).
            # Skip NS on the zone apex — that's the zone's own delegation.
            for TYPE in A AAAA CNAME NS; do
              if [ "$TYPE" = "NS" ] && [ "$NAME" = "$ZONE_NAME" ]; then continue; fi
              ids=$(curl -sS "${AUTH[@]}" "$BASE/zones/$zone_id/dns_records?name=$NAME&type=$TYPE" \
                | jq -r '.result[] | select((.content // "") | endswith(".pages.dev") | not) | .id')
              for rid in $ids; do
                echo "Deleting stray $TYPE record on $NAME (id=$rid)…"
                code=$(curl -sS -o /tmp/del.json -w "%{http_code}" -X DELETE "${AUTH[@]}" \
                  "$BASE/zones/$zone_id/dns_records/$rid")
                if [ "$code" != "200" ]; then
                  echo "Failed to delete record $rid (HTTP $code):"
                  cat /tmp/del.json
                  echo
                  echo "Hint: token needs 'Zone · DNS · Edit' permission."
                  exit 1
                fi
                deleted=$((deleted+1))
              done
            done
          done
          echo "✓ Cleaned $deleted stray record(s); Pages-managed CNAMEs (if any) left intact."

      - name: Attach (or re-attach) custom domains (production only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          PROJECT="pizzarustica-fr"
          API="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${PROJECT}/domains"
          AUTH=(-H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type: application/json")

          attach() {
            local domain="$1"
            local code
            code=$(curl -sS -o /tmp/attach.json -w "%{http_code}" -X POST "${AUTH[@]}" "$API" \
              --data "{\"name\":\"$domain\"}")
            if [ "$code" != "200" ] && [ "$code" != "201" ]; then
              echo "✗ Attach failed for $domain (HTTP $code):"
              cat /tmp/attach.json
              echo
              echo "Hint: token needs 'Account · Cloudflare Pages · Edit' AND the domain must be in a zone on this account."
              return 1
            fi
            echo "✓ $domain attached."
          }

          ZONE_BASE="https://api.cloudflare.com/client/v4"
          ZONE_ID=$(curl -sS "${AUTH[@]}" "$ZONE_BASE/zones?name=pizzarustica.fr" | jq -r '.result[0].id // empty')

          for DOMAIN in www.pizzarustica.fr pizzarustica.fr; do
            info_code=$(curl -sS -o /tmp/info.json -w "%{http_code}" "${AUTH[@]}" "$API/$DOMAIN")
            status=$(jq -r '.result.status // "missing"' /tmp/info.json 2>/dev/null || echo "missing")

            # Even if Pages thinks the domain is active, verify a routing DNS record exists.
            records_in_zone=0
            if [ -n "$ZONE_ID" ]; then
              records_in_zone=$(curl -sS "${AUTH[@]}" "$ZONE_BASE/zones/$ZONE_ID/dns_records?name=$DOMAIN" \
                | jq '[.result[]? | select(.type | test("^(A|AAAA|CNAME)$"))] | length')
            fi
            echo "Domain $DOMAIN: HTTP $info_code, status=$status, A/AAAA/CNAME records in zone=$records_in_zone"

            if [ "$info_code" = "404" ] || [ "$status" = "missing" ]; then
              echo "→ Attaching fresh…"
              attach "$DOMAIN"
              continue
            fi

            if [ "$status" = "active" ] && [ "$records_in_zone" -gt 0 ]; then
              echo "✓ $DOMAIN already active with routing records present."
              continue
            fi

            echo "→ Re-attaching ($DOMAIN status=$status, records=$records_in_zone)…"
            del_code=$(curl -sS -o /tmp/del.json -w "%{http_code}" -X DELETE "${AUTH[@]}" "$API/$DOMAIN")
            if [ "$del_code" != "200" ]; then
              echo "✗ Detach failed (HTTP $del_code):"
              cat /tmp/del.json
              exit 1
            fi
            sleep 3
            attach "$DOMAIN"
          done

          echo "--- Final domain state ---"
          curl -sS "${AUTH[@]}" "$API" | jq '.result[] | {name, status, certificate_authority}'

      - name: Install apex → www 301 redirect (best effort)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          ZONE_NAME="pizzarustica.fr"
          DESC="apex-to-www redirect (managed by CI)"
          AUTH=(-H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type: application/json")
          BASE="https://api.cloudflare.com/client/v4"

          zone_id=$(curl -sS "${AUTH[@]}" "$BASE/zones?name=$ZONE_NAME" \
            | jq -r '.result[0].id // empty')
          if [ -z "$zone_id" ]; then
            echo "⚠ Zone $ZONE_NAME not found via this token — skipping redirect. Site still works on both hostnames."
            exit 0
          fi
          echo "Zone $zone_id"

          PHASE="$BASE/zones/$zone_id/rulesets/phases/http_request_dynamic_redirect/entrypoint"

          NEW_RULE=$(jq -nc --arg desc "$DESC" '{
            action: "redirect",
            description: $desc,
            enabled: true,
            expression: "(http.host eq \"pizzarustica.fr\")",
            action_parameters: {
              from_value: {
                status_code: 301,
                target_url: { expression: "concat(\"https://www.pizzarustica.fr\", http.request.uri.path)" },
                preserve_query_string: true
              }
            }
          }')

          code=$(curl -sS -o /tmp/ruleset.json -w "%{http_code}" "${AUTH[@]}" "$PHASE")
          if [ "$code" = "404" ]; then
            existing="[]"
          elif [ "$code" = "200" ]; then
            existing=$(jq -c --arg desc "$DESC" '[.result.rules[] | select(.description != $desc)]' /tmp/ruleset.json)
          elif [ "$code" = "403" ]; then
            echo "⚠ Token lacks zone scope (HTTP 403) — skipping redirect."
            echo "  To enable: add 'Zone · Config · Edit' to the CLOUDFLARE_API_TOKEN."
            exit 0
          else
            echo "⚠ Unexpected HTTP $code fetching ruleset — skipping redirect:"
            cat /tmp/ruleset.json
            exit 0
          fi

          body=$(jq -nc --argjson existing "$existing" --argjson new "$NEW_RULE" \
            '{rules: ($existing + [$new])}')
          put_code=$(curl -sS -o /tmp/put.json -w "%{http_code}" -X PUT "${AUTH[@]}" "$PHASE" --data "$body")
          if [ "$put_code" != "200" ]; then
            echo "⚠ Failed to install redirect rule (HTTP $put_code) — skipping:"
            cat /tmp/put.json
            exit 0
          fi
          echo "✓ Redirect rule installed: pizzarustica.fr/* → https://www.pizzarustica.fr/* (301)"
